name: ATTACK STORE Dynamic Signer

on:
  workflow_dispatch:
    inputs:
      p12_base64:
        description: 'P12 Certificate'
        required: true
      provision_base64:
        description: 'MobileProvision'
        required: true
      password:
        description: 'Certificate Password'
        required: true
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      udid:
        description: 'Device UDID'
        required: true

permissions:
  contents: write

jobs:
  sign_and_release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies & Build zsign
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev build-essential zip unzip python3
          
          git clone --depth 1 https://github.com/zhlynn/zsign.git
          cd zsign/build/linux
          make clean && make
          sudo mv ../../bin/zsign /usr/local/bin/

      - name: Decode Certs Safely
        run: |
          printf "%s" "${{ github.event.inputs.p12_base64 }}" | base64 -d > cert.p12
          printf "%s" "${{ github.event.inputs.provision_base64 }}" | base64 -d > profile.mobileprovision

      - name: Extract, Deep Patch Name/Icon & Embed Cert
        run: |
          if [ ! -f "base_app.ipa" ]; then
            echo "خطأ: لم يتم العثور على ملف base_app.ipa في المستودع!"
            exit 1
          fi
          
          unzip -q base_app.ipa -d extracted_app
          APP_DIR=$(find extracted_app/Payload -maxdepth 1 -name "*.app" | head -n 1)
          
          # 1. تحميل الأيقونة الجديدة وحفظها باسم ثابت داخل جذر التطبيق
          curl -sL "https://up6.cc/2026/06/178283429697381.png" -o "$APP_DIR/custom_icon.png"
          
          # 2. تشغيل سكربت بايثون لتعديل ملفات النظام وتخطي حماية حزمة الأيقونات والأسماء المترجمة
          python3 -c "
          import plistlib, os, glob

          app_dir = '$APP_DIR'
          plist_path = os.path.join(app_dir, 'Info.plist')

          if os.path.exists(plist_path):
              with open(plist_path, 'rb') as f:
                  pl = plistlib.load(f)

              pl['CFBundleDisplayName'] = 'ATTACK ستور'
              pl['CFBundleName'] = 'ATTACK ستور'
              pl['CFBundleIdentifier'] = 'app.attack'

              icon_config = {
                  'CFBundlePrimaryIcon': {
                      'CFBundleIconFiles': ['custom_icon'],
                      'CFBundleIconName': 'custom_icon'
                  }
              }
              pl['CFBundleIcons'] = icon_config
              pl['CFBundleIcons~ipad'] = icon_config

              with open(plist_path, 'wb') as f:
                  plistlib.dump(pl, f, fmt=plistlib.FMT_BINARY)

          for strings_file in glob.glob(os.path.join(app_dir, '*.lproj', 'InfoPlist.strings')):
              try:
                  os.remove(strings_file)
              except:
                  pass
          "
          
          # 3. دمج الشهادات وتغيير اسم الشهادة إلى ATTACK STORE ليتعرف عليها كود السويفت
          mkdir -p "$APP_DIR/signing-assets/ATTACK STORE"
          cp cert.p12 "$APP_DIR/signing-assets/ATTACK STORE/cert.p12"
          cp profile.mobileprovision "$APP_DIR/signing-assets/ATTACK STORE/cert.mobileprovision"
          echo "${{ github.event.inputs.password }}" > "$APP_DIR/signing-assets/ATTACK STORE/cert.txt"
          
          cd extracted_app
          zip -qr ../modified_app.ipa Payload
          cd ..

      - name: Sign IPA
        run: |
          zsign -k cert.p12 -p "${{ github.event.inputs.password }}" -m profile.mobileprovision -b "app.attack" -n "ATTACK ستور" modified_app.ipa -o signed_app.ipa

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="attack-${{ github.event.inputs.udid }}"
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes --cleanup-tag
            sleep 2
          fi
          
          gh release create "$TAG" signed_app.ipa --title "ATTACK ستور - ${{ github.event.inputs.udid }}" --notes "تم التوقيع بنجاح ودمج شهادة ATTACK STORE تلقائياً."
