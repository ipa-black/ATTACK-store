<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>الرئيسية</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
        }

        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body { 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.8), transparent),
                radial-gradient(2px 2px at 80% 40%, rgba(212,175,55,0.5), transparent),
                radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 70% 90%, rgba(255,255,255,0.9), transparent);
            background-size: 200px 200px;
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { 
            width: 100%;
            max-width: 420px; 
            position: relative;
            z-index: 10;
        }
        
        .logo-container {
            position: relative;
            margin-bottom: 25px;
            display: inline-block;
        }

        .svg-logo { 
            width: 130px; 
            height: 130px; 
            filter: drop-shadow(0px 0px 15px var(--gold-glow));
            transition: transform 0.3s ease;
        }

        .safari-alert {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .safari-alert p {
            color: var(--primary-gold); 
            font-size: 0.8em;
            margin: 0;
            line-height: 1.5;
        }

        .safari-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--primary-gold);
            stroke-width: 1.5;
        }
        
        .btn-primary { 
            display: block; 
            background: linear-gradient(135deg, #E5C07B 0%, #D4AF37 100%);
            color: #000000; 
            padding: 16px 24px; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 700; 
            font-size: 1.15em; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 8px 20px var(--gold-glow);
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
        }
        
        .btn-primary:active { 
            transform: scale(0.97);
            box-shadow: 0 4px 10px var(--gold-glow);
        }
        
        .glass-card {
            background: var(--card-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 24px; 
            margin-top: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .steps-list {
            text-align: right;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .steps-list li {
            position: relative;
            padding-right: 35px;
            margin-bottom: 18px;
            font-size: 0.9em;
            line-height: 1.6;
            color: #d1d1d1;
        }

        .steps-list li:last-child { margin-bottom: 0; }
        .steps-list li strong { color: #ffffff; }
        
        .step-number {
            position: absolute;
            right: 0;
            top: 2px;
            width: 22px;
            height: 22px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: bold;
        }

        #result-section { display: none; }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .result-header h3 { margin: 0; color: #fff; font-size: 1.1em; }
        .success-icon { width: 24px; height: 24px; stroke: #4CAF50; fill: none; stroke-width: 2; }

        .data-row {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
            text-align: left;
            direction: ltr;
        }

        .data-row:last-child { margin-bottom: 0; }

        .data-label {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .data-value-container {
            width: 100%;
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .data-value {
            flex-grow: 1;
            padding: 12px 15px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: var(--primary-gold);
            font-size: 0.95em;
            overflow-x: auto;
            white-space: nowrap;
        }

        .copy-btn {
            background: rgba(212, 175, 55, 0.15);
            color: var(--primary-gold);
            border: none;
            border-left: 1px solid rgba(212, 175, 55, 0.3);
            padding: 0 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .copy-btn:active { background: rgba(212, 175, 55, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="logo-container">
            <svg class="svg-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <clipPath id="circleClip"><circle cx="50" cy="50" r="39" /></clipPath>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#E5C07B" />
                        <stop offset="100%" stop-color="#D4AF37" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="47" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="10 4"/>
                <circle cx="50" cy="50" r="41" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
                <image href="https://up6.cc/2026/06/178281681008481.jpeg" 
                       x="11" y="11" width="78" height="78" 
                       clip-path="url(#circleClip)" 
                       preserveAspectRatio="xMidYMid slice"/>
            </svg>
        </div>
        
        <div class="safari-alert">
            <svg class="safari-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10"/>
                <path d="M16.24 7.76l-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
            </svg>
            <p>رجاءاً افتح هذه الصفحة في متصفح سفاري لتجنب أخطاء التثبيت</p>
        </div>

        <div id="setup-section">
            <a href="/udid.mobileconfig" class="btn-primary">تثبيت الملف التعريفي</a>
            
            <div class="glass-card">
                <ul class="steps-list">
                    <li><span class="step-number">1</span> قم بتنزيل وتثبيت الملف التعريفي.</li>
                    <li><span class="step-number">2</span> توجه إلى <strong>الإعدادات > عام > VPN وإدارة الجهاز</strong>.</li>
                    <li><span class="step-number">3</span> بعد التثبيت، ستعود تلقائياً إلى هنا لنسخ بياناتك.</li>
                </ul>
            </div>
        </div>

        <div id="result-section" class="glass-card">
            <div class="result-header">
                <svg class="success-icon" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 12.5l2.5 2.5 5-5"></path>
                </svg>
                <h3>تم قراءة البيانات بنجاح</h3>
            </div>
            
            <div class="data-row">
                <div class="data-label"><span>UDID</span></div>
                <div class="data-value-container">
                    <div class="data-value" id="udid-val"></div>
                    <button class="copy-btn" onclick="copyData('udid-val')">نسخ</button>
                </div>
            </div>

            <div class="data-row">
                <div class="data-label"><span>Device Model</span></div>
                <div class="data-value-container">
                    <div class="data-value" id="product-val"></div>
                    <button class="copy-btn" onclick="copyData('product-val')">نسخ</button>
                </div>
            </div>

            <div class="data-row">
                <div class="data-label"><span>iOS Version</span></div>
                <div class="data-value-container">
                    <div class="data-value" id="version-val"></div>
                    <button class="copy-btn" onclick="copyData('version-val')">نسخ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // قاموس ترجمة رموز العتاد إلى الأسماء التجارية لأجهزة أبل
        const deviceDictionary = {
            "iPhone12,1": "iPhone 11", "iPhone12,3": "iPhone 11 Pro", "iPhone12,5": "iPhone 11 Pro Max",
            "iPhone12,8": "iPhone SE (2nd Gen)",
            "iPhone13,1": "iPhone 12 mini", "iPhone13,2": "iPhone 12", "iPhone13,3": "iPhone 12 Pro", "iPhone13,4": "iPhone 12 Pro Max",
            "iPhone14,4": "iPhone 13 mini", "iPhone14,5": "iPhone 13", "iPhone14,2": "iPhone 13 Pro", "iPhone14,3": "iPhone 13 Pro Max",
            "iPhone14,6": "iPhone SE (3rd Gen)",
            "iPhone14,7": "iPhone 14", "iPhone14,8": "iPhone 14 Plus", "iPhone15,2": "iPhone 14 Pro", "iPhone15,3": "iPhone 14 Pro Max",
            "iPhone15,4": "iPhone 15", "iPhone15,5": "iPhone 15 Plus", "iPhone16,1": "iPhone 15 Pro", "iPhone16,2": "iPhone 15 Pro Max",
            "iPad8,1": "iPad Pro 11-inch", "iPad8,5": "iPad Pro 12.9-inch (3rd Gen)",
            "iPad13,4": "iPad Pro 11-inch (3rd Gen)", "iPad13,8": "iPad Pro 12.9-inch (5th Gen)"
        };

        // حماية الواجهة
        const preventAction = (e) => e.preventDefault();
        document.addEventListener('contextmenu', preventAction);
        document.addEventListener('selectstart', preventAction);
        
        // دالة النسخ الاحترافية
        function copyData(elementId) {
            const text = document.getElementById(elementId).innerText;
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
            }
            
            // تأثير بصري بسيط للزر عند النسخ
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✓";
            btn.style.color = "#4CAF50";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "var(--primary-gold)";
            }, 1000);
        }

        // استخراج وعرض البيانات
        const urlParams = new URLSearchParams(window.location.search);
        const udid = urlParams.get('udid');
        let product = urlParams.get('product');
        const version = urlParams.get('version');

        if (udid) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('udid-val').innerText = udid;
            // استخدام المترجم، وإذا لم يكن الجهاز في القائمة يتم عرض الرمز كما هو
            document.getElementById('product-val').innerText = deviceDictionary[product] || product || "غير معروف";
            document.getElementById('version-val').innerText = version || "غير معروف";
        }
    </script>
</body>
</html>
