<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرئيسية</title>
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body { 
            background-color: #000000;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 80px 70px, #dddddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 160px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 220px 40px, #aaaaaa, rgba(0,0,0,0)),
                radial-gradient(2.5px 2.5px at 310px 120px, #ffffff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 400px 90px, #dddddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 500px 500px;
            animation: moveStars 60s linear infinite;
            
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }
        
        @keyframes moveStars {
            0% { background-position: 0 0; }
            100% { background-position: -500px 500px; }
        }

        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            position: relative;
            z-index: 10;
        }
        
        .svg-logo { 
            width: 120px; 
            height: 120px; 
            margin-bottom: 10px;
            filter: drop-shadow(0px 0px 8px rgba(212, 175, 55, 0.4));
        }

        .compass-icon,
        .step-icon,
        .check-icon {
            display: inline-block;
            vertical-align: middle;
            width: 1.1em;
            height: 1.1em;
            margin: 0 2px;
        }

        .check-icon {
            width: 1em;
            height: 1em;
        }
        
        .safari-note { 
            color: #D4AF37; 
            font-size: 0.75em;
            margin-bottom: 25px; 
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .btn { 
            display: inline-block; 
            background-color: #D4AF37; 
            color: #000000; 
            padding: 14px 24px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1.1em; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            box-sizing: border-box; 
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .btn:active { 
            transform: scale(0.98);
            opacity: 0.9; 
        }
        
        .steps { 
            text-align: right; 
            background: rgba(17, 17, 17, 0.8); 
            backdrop-filter: blur(5px);
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 25px; 
            border: 1px solid #333333; 
        }
        .steps p { margin: 12px 0; font-size: 0.9em; line-height: 1.6; color: #eee; }
        .steps strong { color: #fff; }
        
        .result-box { 
            display: none; 
            margin-top: 20px; 
            background: rgba(17, 17, 17, 0.9); 
            backdrop-filter: blur(5px);
            padding: 25px 20px; 
            border-radius: 12px; 
            border: 1px solid #D4AF37; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }
        .result-item { margin-bottom: 15px; text-align: right;}
        .result-value { 
            color: #D4AF37; 
            font-family: monospace; 
            word-break: break-all; 
            background: #000; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 8px;
            font-size: 1.05em;
            border: 1px solid #222;
        }

        .copy-btn {
            background: #D4AF37;
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.7em;
            font-weight: bold;
            margin-right: 8px;
            cursor: pointer;
            vertical-align: middle;
            transition: opacity 0.2s;
        }
        .copy-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <svg class="svg-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <clipPath id="circleClip">
                    <circle cx="50" cy="50" r="38" />
                </clipPath>
            </defs>
            <circle cx="50" cy="50" r="46" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="8 4"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#D4AF37" stroke-width="1"/>
            <image href="https://up6.cc/2026/06/178281681008481.jpeg" 
                   x="12" y="12" width="76" height="76" 
                   clip-path="url(#circleClip)" 
                   preserveAspectRatio="xMidYMid slice"/>
        </svg>
        
        <p class="safari-note">
            رجاءاً افتح هذه الصفحة في سفاري عن طريق الضغط على البوصلة الموجودة في الاسفل 
            <svg class="compass-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
                <path d="M12 2 L14 12 L12 22 L10 12 Z" fill="#D4AF37" opacity="0.9"/>
                <circle cx="12" cy="12" r="1.5" fill="#000"/>
            </svg>
        </p>

        <div id="setup-section">
            <a href="/udid.mobileconfig" class="btn">تثبيت الملف التعريفي</a>
            
            <div class="steps">
                <p>
                    <svg class="step-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
                        <text x="12" y="16.5" text-anchor="middle" fill="#D4AF37" font-size="11" font-weight="bold" font-family="sans-serif">1</text>
                    </svg>
                    ثبت الملف التعريفي.
                </p>
                <p>
                    <svg class="step-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
                        <text x="12" y="16.5" text-anchor="middle" fill="#D4AF37" font-size="11" font-weight="bold" font-family="sans-serif">2</text>
                    </svg>
                    توجه الى <strong>الاعدادات > عام > VPN وإدارة الاجهزة</strong>.
                </p>
                <p>
                    <svg class="step-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
                        <text x="12" y="16.5" text-anchor="middle" fill="#D4AF37" font-size="11" font-weight="bold" font-family="sans-serif">3</text>
                    </svg>
                    بعد تثبيت الملف التعريفي ستعود الى هنا، انسخ الـ UDID وارسله للمشرف.
                </p>
            </div>
        </div>

        <div id="result-section" class="result-box">
            <h3 style="margin-top:0; color:#fff; text-align: center;">
                تم استخراج المعلومات بنجاح 
                <svg class="check-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
                    <path d="M8 12.5l2.5 2.5 5-5" stroke="#D4AF37" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </h3>
            <div class="result-item">
                <strong>UDID:</strong> 
                <button class="copy-btn" onclick="copyToClipboard(udid)">نسخ</button>
                <div class="result-value" id="udid-val"></div>
            </div>
            <div class="result-item">
                <strong>نوع الجهاز:</strong> 
                <button class="copy-btn" onclick="copyToClipboard(product)">نسخ</button>
                <div class="result-value" id="product-val"></div>
            </div>
            <div class="result-item">
                <strong>تحديث iOS:</strong> 
                <button class="copy-btn" onclick="copyToClipboard(version)">نسخ</button>
                <div class="result-value" id="version-val"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('copy', function(e) { e.preventDefault(); });
        document.addEventListener('cut', function(e) { e.preventDefault(); });
        document.addEventListener('paste', function(e) { e.preventDefault(); });

        document.addEventListener('keydown', function(e) {
            if (
                (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 'u' || e.key === 'p' || e.key === 'a')) ||
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))
            ) {
                e.preventDefault();
                e.stopPropagation();
            }
        });

        function copyToClipboard(text) {
            if (text && navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                }).catch(() => {});
            } else if (text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand('copy');
                textArea.remove();
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const udid = urlParams.get('udid');
        const product = urlParams.get('product');
        const version = urlParams.get('version');

        if (udid) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('udid-val').innerText = udid;
            document.getElementById('product-val').innerText = product;
            document.getElementById('version-val').innerText = version;
        }
    </script>
</body>
</html>
