<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرئيسية</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body { 
            background-color: #050505;
            background-image: 
                radial-gradient(1.5px 1.5px at 20px 30px, #ffffff, transparent),
                radial-gradient(2px 2px at 80px 70px, rgba(212, 175, 55, 0.5), transparent),
                radial-gradient(1px 1px at 220px 40px, #aaaaaa, transparent),
                radial-gradient(1px 1px at 400px 90px, #dddddd, transparent);
            background-size: 500px 500px;
            animation: moveStars 60s linear infinite;
            
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            min-height: 100vh;
        }
        
        @keyframes moveStars {
            0% { background-position: 0 0; }
            100% { background-position: -500px 500px; }
        }

        .container { 
            max-width: 450px; 
            margin: 0 auto; 
            position: relative;
            z-index: 10;
        }
        
        .svg-logo { 
            width: 120px; 
            height: 120px; 
            margin-bottom: 10px;
            filter: drop-shadow(0px 0px 10px rgba(212, 175, 55, 0.3));
        }

        .compass-icon {
            display: inline-block;
            vertical-align: middle;
            width: 1.1em;
            height: 1.1em;
            margin: 0 2px;
        }
        
        .safari-note { 
            color: #D4AF37; 
            font-size: 0.75em;
            margin-bottom: 25px; 
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .btn { 
            display: inline-block; 
            background: linear-gradient(135deg, #D4AF37 0%, #aa8825 100%);
            color: #000000; 
            padding: 16px 24px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1.1em; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        
        .steps { 
            text-align: right; 
            background: rgba(17, 17, 17, 0.7); 
            backdrop-filter: blur(8px);
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.1); 
        }
        .steps p { margin: 12px 0; font-size: 0.9em; line-height: 1.6; color: #eee; }
        .steps strong { color: #fff; }
        
        .result-box { 
            display: none; 
            margin-top: 20px; 
            background: rgba(17, 17, 17, 0.8); 
            backdrop-filter: blur(10px);
            padding: 25px 20px; 
            border-radius: 12px; 
            border: 1px solid #D4AF37; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
        }

        .data-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid #222;
        }

        .data-label { color: #888; font-size: 0.85em; font-weight: bold;}
        .data-value { color: #D4AF37; font-family: monospace; font-size: 1em; direction: ltr; }

        .copy-btn {
            background: #D4AF37;
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8em;
            font-weight: bold;
            cursor: pointer;
        }
        .copy-btn:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        
        <svg class="svg-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <clipPath id="circleClip">
                    <circle cx="50" cy="50" r="38" />
                </clipPath>
            </defs>
            <circle cx="50" cy="50" r="46" fill="none" stroke="#D4AF37" stroke-width="2" stroke-dasharray="8 4"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#D4AF37" stroke-width="1"/>
            <image href="https://up6.cc/2026/06/178281681008481.jpeg" 
                   x="12" y="12" width="76" height="76" 
                   clip-path="url(#circleClip)" 
                   preserveAspectRatio="xMidYMid slice"/>
        </svg>
        
        <p class="safari-note">
            رجاءاً افتح هذه الصفحة في سفاري عن طريق الضغط على البوصلة الموجودة في الاسفل 
            <svg class="compass-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
                <path d="M12 2 L14 12 L12 22 L10 12 Z" fill="#D4AF37" opacity="0.9"/>
                <circle cx="12" cy="12" r="1.5" fill="#000"/>
            </svg>
        </p>

        <div id="setup-section">
            <a href="/udid.mobileconfig" class="btn">تثبيت الملف التعريفي</a>
            
            <div class="steps">
                <p>1️⃣ ثبت الملف التعريفي.</p>
                <p>2️⃣ توجه الى <strong>الاعدادات > عام > VPN وإدارة الاجهزة</strong>.</p>
                <p>3️⃣ بعد التثبيت، ستعود الى هنا لنسخ بيانات جهازك.</p>
            </div>
        </div>

        <div id="result-section" class="result-box">
            <h3 style="margin-top:0; margin-bottom: 25px; color:#fff; text-align: center;">تم قراءة البيانات بنجاح ✅</h3>
            
            <div class="data-row">
                <div>
                    <div class="data-label">UDID</div>
                    <div class="data-value" id="udid-val"></div>
                </div>
                <button class="copy-btn" onclick="copyData('udid-val')">نسخ</button>
            </div>

            <div class="data-row">
                <div>
                    <div class="data-label">نوع الجهاز</div>
                    <div class="data-value" id="product-val"></div>
                </div>
                <button class="copy-btn" onclick="copyData('product-val')">نسخ</button>
            </div>

            <div class="data-row">
                <div>
                    <div class="data-label">تحديث iOS</div>
                    <div class="data-value" id="version-val"></div>
                </div>
                <button class="copy-btn" onclick="copyData('version-val')">نسخ</button>
            </div>
        </div>
    </div>

    <script>
        // قاموس ترجمة رموز العتاد المعقدة إلى الأسماء الرسمية
        const deviceDictionary = {
            "iPhone10,3": "iPhone X", "iPhone10,6": "iPhone X",
            "iPhone11,2": "iPhone XS", "iPhone11,4": "iPhone XS Max", "iPhone11,8": "iPhone XR",
            "iPhone12,1": "iPhone 11", "iPhone12,3": "iPhone 11 Pro", "iPhone12,5": "iPhone 11 Pro Max",
            "iPhone12,8": "iPhone SE (2nd Gen)",
            "iPhone13,1": "iPhone 12 mini", "iPhone13,2": "iPhone 12", "iPhone13,3": "iPhone 12 Pro", "iPhone13,4": "iPhone 12 Pro Max",
            "iPhone14,4": "iPhone 13 mini", "iPhone14,5": "iPhone 13", "iPhone14,2": "iPhone 13 Pro", "iPhone14,3": "iPhone 13 Pro Max",
            "iPhone14,6": "iPhone SE (3rd Gen)",
            "iPhone14,7": "iPhone 14", "iPhone14,8": "iPhone 14 Plus", "iPhone15,2": "iPhone 14 Pro", "iPhone15,3": "iPhone 14 Pro Max",
            "iPhone15,4": "iPhone 15", "iPhone15,5": "iPhone 15 Plus", "iPhone16,1": "iPhone 15 Pro", "iPhone16,2": "iPhone 15 Pro Max"
        };

        // قاموس ترجمة أرقام البناء إلى تحديثات iOS (أهم الإصدارات الأخيرة)
        const versionDictionary = {
            "21F90": "iOS 17.5.1",
            "21F79": "iOS 17.5",
            "21E237": "iOS 17.4.1",
            "21E236": "iOS 17.4.1",
            "21E219": "iOS 17.4",
            "21D61": "iOS 17.3.1",
            "21D50": "iOS 17.3",
            "21C66": "iOS 17.2.1",
            "21C62": "iOS 17.2",
            "21B101": "iOS 17.1.2",
            "21B91": "iOS 17.1.1",
            "21B74": "iOS 17.1",
            "21A360": "iOS 17.0"
        };

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());

        function copyData(elementId) {
            const text = document.getElementById(elementId).innerText;
            const tempArea = document.createElement("textarea");
            tempArea.value = text;
            tempArea.style.position = "fixed";
            tempArea.style.opacity = "0";
            document.body.appendChild(tempArea);
            tempArea.select();
            document.execCommand('copy');
            tempArea.remove();
            
            // تأثير بصري للزر عند النسخ
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✓ تم";
            setTimeout(() => { btn.innerText = originalText; }, 1000);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const udid = urlParams.get('udid');
        const productRaw = urlParams.get('product');
        const versionRaw = urlParams.get('version');

        if (udid) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            // الترجمة باستخدام القاموس، وإذا لم يكن مسجلاً يعرض الرمز الأصلي
            const finalProduct = deviceDictionary[productRaw] || productRaw || "غير معروف";
            let finalVersion = versionDictionary[versionRaw] || versionRaw || "غير معروف";
            
            // توضيح للمستخدم إذا أرسلت أبل بناءً غير مسجل في القاموس
            if (versionRaw && !versionDictionary[versionRaw]) {
                finalVersion = `(رقم البناء: ${versionRaw})`;
            }

            document.getElementById('udid-val').innerText = udid;
            document.getElementById('product-val').innerText = finalProduct;
            document.getElementById('version-val').innerText = finalVersion;
        }
    </script>
</body>
</html>
